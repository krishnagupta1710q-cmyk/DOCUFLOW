<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuFlow - Editor</title>
    <style>
        body { font-family: sans-serif; margin: 20px; display: flex; gap: 40px; }
        #sidebar { width: 35%; border-right: 1px solid #ccc; padding-right: 20px; }
        #editor-container { width: 60%; display: none; }
        textarea { width: 100%; height: 300px; margin-top: 10px; padding: 10px; }
        .doc-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .doc-link { cursor: pointer; color: blue; text-decoration: underline; flex-grow: 1; }
        .delete-btn { background: none; border: none; color: red; cursor: pointer; font-size: 14px; padding: 2px 6px; }
        .delete-btn:hover { text-decoration: underline; }
        button { margin-top: 10px; padding: 8px 12px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- SIDEBAR: Dashboard List -->
    <div id="sidebar">
        <h1>DocuFlow</h1>
        <div>
            <input type="text" id="doc-title" placeholder="New document title...">
            <button onclick="createDocument()">Create</button>
        </div>
        <h3>Your Documents:</h3>
        <ul id="document-list"></ul>
    </div>

    <!-- MAIN AREA: The Text Editor -->
    <div id="editor-container">
        <h2 id="active-title">Select a document</h2>
        <textarea id="editor-body" placeholder="Start typing your content here..."></textarea>
        <br>
        <button onclick="saveDocument()">Save Content</button>
    </div>

    <script>
        let currentDocId = null;

        function loadDocuments() {
            fetch('/api/documents')
                .then(response => response.json())
                .then(data => {
                    const list = document.getElementById('document-list');
                    list.innerHTML = "";
                    data.forEach(doc => {
                        // Create a wrapper container for title + delete button
                        const div = document.createElement('div');
                        div.className = "doc-item";

                        // Document title link
                        const span = document.createElement('span');
                        span.className = "doc-link";
                        span.textContent = doc.title;
                        span.onclick = () => openEditor(doc.id, doc.title, doc.content);

                        // Delete button
                        const deleteBtn = document.createElement('button');
                        deleteBtn.className = "delete-btn";
                        deleteBtn.textContent = "🗑️";
                        deleteBtn.onclick = (e) => {
                            e.stopPropagation(); // Prevents the editor from opening when deleting
                            deleteDocument(doc.id);
                        };

                        div.appendChild(span);
                        div.appendChild(deleteBtn);
                        list.appendChild(div);
                    });
                })
                .catch(err => console.error(err));
        }

        function createDocument() {
            const titleInput = document.getElementById('doc-title');
            const titleText = titleInput.value.trim();
            if (!titleText) return alert("Please enter a title!");

            fetch('/api/documents', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: titleText })
            })
            .then(response => response.json())
            .then(() => {
                titleInput.value = "";
                loadDocuments();
            });
        }

        function openEditor(id, title, content) {
            currentDocId = id;
            document.getElementById('active-title').textContent = title;
            document.getElementById('editor-body').value = content || "";
            document.getElementById('editor-container').style.display = "block";
        }

        function saveDocument() {
            if (!currentDocId) return;
            const contentText = document.getElementById('editor-body').value;

            fetch(`/api/documents/${currentDocId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: contentText })
            })
            .then(response => response.json())
            .then(() => {
                alert("Document saved successfully!");
                loadDocuments(); 
            })
            .catch(err => console.error(err));
        }

        // NEW: Function to delete a document
        function deleteDocument(id) {
            if (!confirm("Are you sure you want to delete this document?")) return;

            fetch(`/api/documents/${id}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(() => {
                // If we deleted the document currently open in the editor, hide the editor
                if (currentDocId === id) {
                    currentDocId = null;
                    document.getElementById('editor-container').style.display = "none";
                }
                loadDocuments(); // Refresh list
            })
            .catch(err => console.error(err));
        }

        loadDocuments();
    </script>
</body>
</html>
