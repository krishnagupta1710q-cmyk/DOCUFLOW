<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuFlow - Workspace</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #f8f9fa; color: #333; }
        
        #sidebar { 
            width: 320px; background-color: #ffffff; border-right: 1px solid #e9ecef; 
            display: flex; flex-direction: column; padding: 24px;
        }
        h1 { font-size: 24px; font-weight: 700; color: #1a73e8; margin-bottom: 20px; letter-spacing: -0.5px; }
        h3 { font-size: 12px; text-transform: uppercase; color: #adb5bd; margin-bottom: 12px; margin-top: 24px; }
        
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        input[type="text"] { 
            flex-grow: 1; padding: 10px 14px; border: 1px solid #ced4da; 
            border-radius: 6px; font-size: 14px; outline: none; transition: border 0.2s;
        }
        input[type="text"]:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        
        button { 
            padding: 10px 16px; background-color: #1a73e8; color: white; border: none; 
            border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        button:hover { background-color: #1557b0; }

        #document-list { list-style: none; overflow-y: auto; flex-grow: 1; margin-top: 10px; }
        .doc-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 14px; margin-bottom: 6px; border-radius: 6px; 
            background-color: #f8f9fa; transition: background 0.2s, transform 0.1s;
        }
        .doc-item:hover { background-color: #edf2fa; transform: translateY(-1px); }
        .doc-link { cursor: pointer; color: #495057; font-weight: 500; flex-grow: 1; font-size: 14px; }
        .doc-item:hover .doc-link { color: #1a73e8; }
        
        .delete-btn { 
            background: none; border: none; color: #dc3545; cursor: pointer; 
            font-size: 14px; padding: 4px; border-radius: 4px; display: flex; align-items: center; transition: background 0.2s;
        }
        .delete-btn:hover { background-color: #fbebebdc; }

        #editor-container { 
            flex-grow: 1; display: none; padding: 40px; 
            background-color: #ffffff; flex-direction: column; gap: 16px;
        }
        #active-title { font-size: 28px; font-weight: 600; color: #212529; border-bottom: 2px solid #f1f3f4; padding-bottom: 12px; }
        textarea { 
            width: 100%; flex-grow: 1; height: 60vh; max-height: 70vh; padding: 20px; 
            border: 1px solid #e9ecef; border-radius: 8px; font-size: 16px; line-height: 1.6;
            color: #495057; background-color: #f8f9fa; resize: none; outline: none; transition: border 0.2s;
        }
        textarea:focus { border-color: #1a73e8; background-color: #ffffff; }
        
        /* Action buttons container alignment */
        .action-group { display: flex; gap: 12px; }
        .download-btn { background-color: #34a853; }
        .download-btn:hover { background-color: #2d8e47; }

        #empty-state {
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; color: #adb5bd; gap: 8px;
        }
        #empty-state svg { width: 64px; height: 64px; fill: #e9ecef; }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <h1>DocuFlow</h1>
        <div class="input-group">
            <input type="text" id="doc-title" placeholder="New document title...">
            <button onclick="createDocument()">Create</button>
        </div>
        <h3>Your Documents</h3>
        <div id="document-list"></div>
    </div>

    <!-- EMPTY STATE VIEW -->
    <div id="empty-state">
        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
        <p>Select a file from the sidebar or make a new one to begin typing.</p>
    </div>

    <!-- ACTIVE TEXT EDITOR -->
    <div id="editor-container">
        <h2 id="active-title">Select a document</h2>
        <textarea id="editor-body" placeholder="Start your brainstorming or documentation here..."></textarea>
        
        <div class="action-group">
            <button onclick="saveDocument()">Save Layout Content</button>
            <!-- NEW: Download Button -->
            <button class="download-btn" onclick="downloadDocument()">📥 Download File</button>
        </div>
    </div>

    <script>
        let currentDocId = null;

        function loadDocuments() {
            fetch('/api/documents')
                .then(response => response.json())
                .then(data => {
                    const list = document.getElementById('document-list');
                    list.innerHTML = "";
                    data.forEach(doc => {
                        const div = document.createElement('div');
                        div.className = "doc-item";

                        const span = document.createElement('span');
                        span.className = "doc-link";
                        span.textContent = doc.title;
                        span.onclick = () => openEditor(doc._id, doc.title, doc.content);

                        const deleteBtn = document.createElement('button');
                        deleteBtn.className = "delete-btn";
                        deleteBtn.innerHTML = "&#128465;&#65039;";
                        deleteBtn.onclick = (e) => {
                            e.stopPropagation();
                            deleteDocument(doc._id);
                        };

                        div.appendChild(span);
                        div.appendChild(deleteBtn);
                        list.appendChild(div);
                    });
                })
                .catch(err => console.error(err));
        }

        function createDocument() {
            const titleInput = document.getElementById('doc-title');
            const titleText = titleInput.value.trim();
            if (!titleText) return alert("Please enter a title!");

            fetch('/api/documents', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: titleText })
            })
            .then(response => response.json())
            .then(() => {
                titleInput.value = "";
                loadDocuments();
            });
        }

        function openEditor(id, title, content) {
            currentDocId = id;
            document.getElementById('empty-state').style.display = "none";
            document.getElementById('active-title').textContent = title;
            document.getElementById('editor-body').value = content || "";
            document.getElementById('editor-container').style.display = "flex";
        }

        function saveDocument() {
            if (!currentDocId) return;
            const contentText = document.getElementById('editor-body').value;

            fetch(`/api/documents/${currentDocId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: contentText })
            })
            .then(response => response.json())
            .then(() => {
                alert("Changes saved to cloud successfully!");
                loadDocuments(); 
            })
            .catch(err => console.error(err));
        }

        function deleteDocument(id) {
            if (!confirm("Are you sure you want to delete this document?")) return;

            fetch(`/api/documents/${id}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(() => {
                if (currentDocId === id) {
                    currentDocId = null;
                    document.getElementById('editor-container').style.display = "none";
                    document.getElementById('empty-state').style.display = "flex";
                }
                loadDocuments();
            })
            .catch(err => console.error(err));
        }

        // NEW: Handles client-side file compiling and auto-download execution
        function downloadDocument() {
            const title = document.getElementById('active-title').textContent;
            const content = document.getElementById('editor-body').value;
            
            // Turn plain text data into a Blob stream
            const blob = new Blob([content], { type: 'text/markdown;charset=utf-8;' });
            
            // Create a ghost link to automatically force a click download action
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `${title.replace(/\s+/g, '_')}.md`); // Saves as a dynamic markdown (.md) document!
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        loadDocuments();
    </script>
</body>
</html>
