<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuFlow - Secure Workspace</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #f8f9fa; color: #333; overflow: hidden; }
        
        /* Auth Overlay Form Panel */
        #auth-overlay {
            position: fixed; top:0; left:0; width:100vw; height:100vh; background:#edf2fa;
            display: flex; justify-content: center; align-items: center; z-index: 999;
        }
        .auth-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 360px; }
        .auth-card h2 { font-size: 24px; margin-bottom: 20px; color: #1a73e8; font-weight: 700; text-align: center; }
        .auth-card input { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 6px; margin-bottom: 14px; outline: none; }
        .auth-card button { width: 100%; margin-top: 5px; }
        .auth-toggle { text-align: center; font-size: 13px; margin-top: 16px; color: #5f6368; cursor: pointer; }
        .auth-toggle:hover { text-decoration: underline; color: #1a73e8; }

        /* Workspace Grid Layout */
        #sidebar { 
            width: 320px; background-color: #ffffff; border-right: 1px solid #e9ecef; 
            display: flex; flex-direction: column; padding: 24px;
        }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 700; color: #1a73e8; letter-spacing: -0.5px; }
        .logout-link { font-size: 13px; color: #dc3545; cursor: pointer; text-decoration: underline; }
        
        h3 { font-size: 12px; text-transform: uppercase; color: #adb5bd; margin-bottom: 12px; margin-top: 24px; }
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        input[type="text"] { flex-grow: 1; padding: 10px 14px; border: 1px solid #ced4da; border-radius: 6px; font-size: 14px; outline: none; }
        input[type="text"]:focus { border-color: #1a73e8; }
        
        button { padding: 10px 16px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
        button:hover { background-color: #1557b0; }

        #document-list { list-style: none; overflow-y: auto; flex-grow: 1; margin-top: 10px; }
        .doc-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; margin-bottom: 6px; border-radius: 6px; background-color: #f8f9fa; }
        .doc-item:hover { background-color: #edf2fa; }
        .doc-link { cursor: pointer; color: #495057; font-weight: 500; flex-grow: 1; font-size: 14px; }
        .delete-btn { background: none; border: none; color: #dc3545; cursor: pointer; font-size: 14px; padding: 4px; }

        #editor-container { flex-grow: 1; display: none; padding: 40px; background-color: #ffffff; flex-direction: column; gap: 16px; }
        #active-title { font-size: 28px; font-weight: 600; color: #212529; border-bottom: 2px solid #f1f3f4; padding-bottom: 12px; }
        
        .toolbar { display: flex; gap: 6px; background-color: #f1f3f4; padding: 8px; border-radius: 6px; border: 1px solid #e9ecef; }
        .toolbar-btn { background: none; color: #495057; padding: 6px 12px; font-size: 14px; border-radius: 4px; width: auto; }
        .toolbar-btn:hover { background-color: #e8eaed; color: #1a73e8; }

        #editor-body { width: 100%; flex-grow: 1; height: 55vh; padding: 20px; border: 1px solid #e9ecef; border-radius: 8px; font-size: 16px; line-height: 1.6; background-color: #f8f9fa; overflow-y: auto; outline: none; }
        #editor-body:focus { border-color: #1a73e8; background-color: #ffffff; }
        
        .action-group { display: flex; gap: 12px; }
        .download-btn { background-color: #34a853; }
        .download-btn:hover { background-color: #2d8e47; }

        #empty-state { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #adb5bd; gap: 8px; }
        #empty-state svg { width: 64px; height: 64px; fill: #e9ecef; }
    </style>
</head>
<body>

    <!-- AUTHENTICATION WINDOW OVERLAY -->
    <div id="auth-overlay">
        <div class="auth-card" id="auth-card">
            <h2 id="auth-title">Login to DocuFlow</h2>
            <input type="text" id="auth-user" placeholder="Username">
            <input type="password" id="auth-pass" placeholder="Password">
            <button id="auth-submit-btn" onclick="handleAuthSubmit()">Log In</button>
            <div class="auth-toggle" id="auth-toggle-msg" onclick="toggleAuthMode()">Don't have an account? Sign up</div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <div class="sidebar-header">
            <h1>DocuFlow</h1>
            <span class="logout-link" onclick="logout()">Logout</span>
        </div>
        <div class="input-group">
            <input type="text" id="doc-title" placeholder="New document title...">
            <button onclick="createDocument()">Create</button>
        </div>
        <h3>Your Documents</h3>
        <div id="document-list"></div>
    </div>

    <!-- EMPTY STATE VIEW -->
    <div id="empty-state">
        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
        <p>Select a file from the sidebar or make a new one to begin typing.</p>
    </div>

    <!-- ACTIVE RICH TEXT EDITOR -->
    <div id="editor-container">
        <h2 id="active-title">Select a document</h2>
        
        <div class="toolbar">
            <button class="toolbar-btn" onclick="formatText('bold')"><b>B</b></button>
            <button class="toolbar-btn" onclick="formatText('italic')"><i>I</i></button>
            <button class="toolbar-btn" onclick="formatText('underline')"><u>U</u></button>
            <button class="toolbar-btn" onclick="formatText('formatBlock', 'h3')">Heading</button>
            <button class="toolbar-btn" onclick="formatText('insertUnorderedList')">• Bullet List</button>
        </div>

        <div id="editor-body" contenteditable="true"></div>
        
        <div class="action-group">
            <button onclick="saveDocument()">Save Content Layout</button>
            <button class="download-btn" onclick="downloadDocument()">📥 Download File</button>
        </div>
    </div>

    <script>
        let currentDocId = null;
        let isSignUpMode = false;

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('auth-title').textContent = isSignUpMode ? "Create Account" : "Login to DocuFlow";
            document.getElementById('auth-submit-btn').textContent = isSignUpMode ? "Register Account" : "Log In";
            document.getElementById('auth-toggle-msg').textContent = isSignUpMode ? "Already have an account? Log in" : "Don't have an account? Sign up";
        }

        function handleAuthSubmit() {
            const username = document.getElementById('auth-user').value.trim();
            const password = document.getElementById('auth-pass').value;
            if(!username || !password) return alert("Please fill in all inputs.");

            const url = isSignUpMode ? '/api/auth/signup' : '/api/auth/login';

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(res => res.json())
            .then(data => {
                if(data.error) return alert(data.error);
                
                alert(data.message || "Welcome back!");
                if(isSignUpMode) {
                    toggleAuthMode(); // Switch back to login view after signing up
                } else {
                    document.getElementById('auth-overlay').style.display = "none"; // Hide panel login box
                    loadDocuments();
                }
            })
            .catch(err => console.error(err));
        }

        function logout() {
            fetch('/api/auth/logout', { method: 'POST' })
            .then(() => {
                document.getElementById('auth-overlay').style.display = "flex";
                document.getElementById('editor-container').style.display = "none";
                document.getElementById('empty-state').style.display = "flex";
                document.getElementById('document-list').innerHTML = "";
                document.getElementById('auth-user').value = "";
                document.getElementById('auth-pass').value = "";
            });
        }

        function formatText(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('editor-body').focus();
        }

        function loadDocuments() {
            fetch('/api/documents')
                .then(res => {
                    if (res.status === 401) {
                        document.getElementById('auth-overlay').style.display = "flex";
                        throw new Error("Unauthorized");
                    }
                    return res.json();
                })
                .then(data => {
                    const list = document.getElementById('document-list');
                    list.innerHTML = "";
                    data.forEach(doc => {
                        const div = document.createElement('div');
                        div.className = "doc-item";

                        const span = document.createElement('span');
                        span.className = "doc-link";
                        span.textContent = doc.title;
                        span.onclick = () => openEditor(doc._id, doc.title, doc.content);

                        const deleteBtn = document.createElement('button');
                        deleteBtn.className = "delete-btn";
                        deleteBtn.innerHTML = "&#128465;&#65039;";
                        deleteBtn.onclick = (e) => {
                            e.stopPropagation();
                            deleteDocument(doc._id);
                        };

                        div.appendChild(span);
                        div.appendChild(deleteBtn);
                        list.appendChild(div);
                    });
                })
                .catch(err => console.log("Session verified or user required login."));
        }

        function createDocument() {
            const titleInput = document.getElementById('doc-title');
            const titleText = titleInput.value.trim();
            if (!titleText) return alert("Please enter a title!");

            fetch('/api/documents', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: titleText })
            })
            .then(response => response.json())
            .then(() => {
                titleInput.value = "";
                loadDocuments();
            });
        }

        function openEditor(id, title, content) {
            currentDocId = id;
            document.getElementById('empty-state').style.display = "none";
            document.getElementById('active-title').textContent = title;
            document.getElementById('editor-body').innerHTML = content || "";
            document.getElementById('editor-container').style.display = "flex";
        }

        function saveDocument() {
            if (!currentDocId) return;
            const contentHTML = document.getElementById('editor-body').innerHTML;

            fetch(`/api/documents/${currentDocId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: contentHTML })
            })
            .then(response => response.json())
            .then(() => {
                alert("Rich text workspace saved safely!");
                loadDocuments(); 
            })
            .catch(err => console.error(err));
        }

        function deleteDocument(id) {
            if (!confirm("Are you sure you want to delete this document?")) return;

            fetch(`/api/documents/${id}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(() => {
                if (currentDocId === id) {
                    currentDocId = null;
                    document.getElementById('editor-container').style.display = "none";
                    document.getElementById('empty-state').style.display = "flex";
                }
                loadDocuments();
            })
            .catch(err => console.error(err));
        }

        function downloadDocument() {
            const title = document.getElementById('active-title').textContent;
            const content = document.getElementById('editor-body').innerText;
            
            const blob = new Blob([content], { type: 'text/markdown;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `${title.replace(/\s+/g, '_')}.md`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Initialize checking if a cookie session is already valid on load
        loadDocuments();
    </script>
</body>
</html>
